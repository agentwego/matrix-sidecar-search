version: '3'

vars:
  PYTHON: uv run python

tasks:
  install:
    desc: Install project dependencies
    cmds:
      - uv sync --extra dev

  test:
    desc: Run tests
    cmds:
      - uv run python -m pytest

  lint:
    desc: Run ruff lint
    cmds:
      - uv run python -m ruff check src tests

  format:
    desc: Format code
    cmds:
      - uv run python -m ruff format src tests

  check:
    desc: Run lint and tests
    cmds:
      - task: lint
      - task: test

  api:dev:
    desc: Run API locally
    cmds:
      - uv run uvicorn matrix_sidecar_search.api:app --reload --host 127.0.0.1 --port 8088

  indexer:once:
    desc: Run one indexer polling cycle
    cmds:
      - uv run matrix-sidecar-search indexer --once
